name: Build Whitepaper PDF

on:
  push:
    branches: [master]
    paths:
      - "zh-TW/**"
      - "en/**"
      - "assets/pdf/**"
      - ".github/workflows/build-pdf.yml"
  pull_request:
    paths:
      - "zh-TW/**"
      - "en/**"
      - "assets/pdf/**"
      - ".github/workflows/build-pdf.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # required for release asset upload

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        lang: [zh-TW, en]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc, XeLaTeX, Noto CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-lang-cjk \
            texlive-lang-chinese \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            librsvg2-bin \
            python3
          # Diagnostic: show what fonts are actually installed
          echo "=== /usr/share/fonts/opentype/noto/ ==="
          ls /usr/share/fonts/opentype/noto/ 2>/dev/null | head -20
          echo "=== fc-list for Noto CJK TC ==="
          fc-list :lang=zh-tw | head -10
          echo "=== fc-match Noto Serif CJK TC ==="
          fc-match "Noto Serif CJK TC"
          echo "=== fc-match Noto Sans CJK TC ==="
          fc-match "Noto Sans CJK TC"

      - name: Concatenate chapters
        run: |
          bash assets/pdf/concat.sh ${{ matrix.lang }} > whitepaper-${{ matrix.lang }}.md
          echo "=== Concatenated size ==="
          wc -l whitepaper-${{ matrix.lang }}.md
          wc -c whitepaper-${{ matrix.lang }}.md

      - name: Preprocess for XeLaTeX (strip mermaid, emoji, variation selectors)
        run: |
          python3 <<'PY'
          import re, pathlib
          lang = "${{ matrix.lang }}"
          src = pathlib.Path(f"whitepaper-{lang}.md")
          text = src.read_text(encoding="utf-8")

          # 1. Strip mermaid blocks (XeLaTeX cannot render them)
          text = re.sub(r"```mermaid\n.*?\n```", "\n_[Mermaid diagram — see online version for rendering]_\n", text, flags=re.DOTALL)

          # 2. Strip emoji / pictographs (XeLaTeX with Noto CJK alone cannot render color emoji)
          emoji_ranges = "".join([
              "\U0001F300-\U0001F5FF",  # symbols & pictographs
              "\U0001F600-\U0001F64F",  # emoticons
              "\U0001F680-\U0001F6FF",  # transport
              "\U0001F900-\U0001F9FF",  # supplemental symbols
              "\U0001FA00-\U0001FA6F",
              "\U0001FA70-\U0001FAFF",
              "\u2600-\u27BF",          # misc symbols + dingbats
          ])
          text = re.sub(f"[{emoji_ranges}]", "", text)

          # 3. Strip Unicode variation selectors (VS15/VS16) that can confuse XeLaTeX
          text = re.sub(r"[\uFE00-\uFE0F]", "", text)

          src.write_text(text, encoding="utf-8")
          print(f"Preprocessed {src} → {len(text)} chars")
          PY

      - name: Run Pandoc → PDF
        id: pandoc
        run: |
          set +e
          pandoc whitepaper-${{ matrix.lang }}.md \
            --metadata-file=assets/pdf/metadata-${{ matrix.lang }}.yaml \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=3 \
            --number-sections \
            -o whitepaper-${{ matrix.lang }}.pdf 2> pandoc-${{ matrix.lang }}.log
          rc=$?
          set -e
          if [[ $rc -ne 0 ]]; then
            first_error=$(grep -m1 -E "! |Error:" pandoc-${{ matrix.lang }}.log || echo "pandoc failed (see full log)")
            echo "::error title=PDF build failed (${{ matrix.lang }})::${first_error}"
            echo "### Pandoc log (${{ matrix.lang }})" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -c 20000 pandoc-${{ matrix.lang }}.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $rc
          fi
          ls -lh whitepaper-${{ matrix.lang }}.pdf

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-${{ matrix.lang }}
          path: |
            whitepaper-${{ matrix.lang }}.pdf
            whitepaper-${{ matrix.lang }}.md
            pandoc-${{ matrix.lang }}.log
          if-no-files-found: warn
          retention-days: 90

      - name: Attach PDF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: whitepaper-${{ matrix.lang }}.pdf
