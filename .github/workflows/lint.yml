name: Lint Markdown

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint all markdown
        run: |
          markdownlint '**/*.md' --ignore 'node_modules/**' --config .markdownlint.jsonc

  link-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude 'rag\.baiyuan\.io'
            --exclude 'rag1\.baiyuan\.io'
            --max-concurrency 8
            --accept 200..=299,429
            '**/*.md'
          fail: true
