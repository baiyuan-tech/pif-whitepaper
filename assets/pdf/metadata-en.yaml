title: "PIF AI Whitepaper"
subtitle: "A Multi-Tenant AI-Assisted Platform for Cosmetic PIF Documentation"
author: "Vincent Lin (Baiyuan Tech)"
date: "2026-04-19"
lang: en

abstract: |
  Technical whitepaper of the PIF AI multi-tenant platform for AI-assisted
  Cosmetic Product Information File (PIF) documentation under Taiwan's
  Cosmetic Hygiene and Safety Act. Covers regulatory background, system
  architecture, the AI engine (built with Anthropic Claude and Claude Code),
  toxicology data pipeline, the central RAG integration (Scheme C+ isolation
  model, with L1 LLM Wiki + L2 vector RAG dual-layer retrieval), security
  model, SA review workflow, and the open-source and deployment strategies.
  ~27,000 English words + 15 Mermaid figures.

