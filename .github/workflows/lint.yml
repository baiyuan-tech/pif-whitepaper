name: Lint Markdown

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint all markdown
        # Informational only at v0.1 — do not fail the build while we stabilize rules.
        continue-on-error: true
        run: |
          markdownlint '**/*.md' --ignore 'node_modules/**' --config .markdownlint.jsonc

  link-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Lychee link check
        # Informational only at v0.1 — lychee's anchor matching on CJK headings is buggy;
        # many false positives. Revisit once we stabilize heading slugs.
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude 'rag\.baiyuan\.io'
            --exclude 'rag1\.baiyuan\.io'
            --exclude 'github\.com/baiyuan-tech/pif/'
            --exclude 'github\.com/baiyuan-tech/pif\b'
            --exclude 'pif\.baiyuan\.io'
            --exclude 'cosmetic-register\.fda\.gov\.tw'
            --exclude 'data\.fda\.gov\.tw'
            --exclude 'echemportal\.org'
            --exclude 'echa\.europa\.eu'
            --max-concurrency 8
            --accept 200..=299,403,429
            '**/*.md'
          fail: false
