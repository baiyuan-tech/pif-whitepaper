name: Build Whitepaper PDF

# Aligned with sibling project baiyuan-tech/geo-whitepaper: fonts injected via
# -V CLI flags (not header-includes) to avoid pandoc markdown-escaping of
# fontspec [options]. lang: zh-Hant-TW in metadata to bypass ctexhook.

on:
  push:
    branches: [master]
    paths:
      - "zh-TW/**"
      - "en/**"
      - "assets/pdf/**"
      - ".github/workflows/build-pdf.yml"
  pull_request:
    paths:
      - "zh-TW/**"
      - "en/**"
      - "assets/pdf/**"
      - ".github/workflows/build-pdf.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # required for release asset upload

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        lang: [zh-TW, en]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XeLaTeX + CJK fonts + Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-lang-chinese texlive-fonts-recommended \
            texlive-latex-extra texlive-latex-recommended \
            lmodern \
            fonts-noto-cjk fonts-noto-cjk-extra \
            fonts-noto-color-emoji pandoc librsvg2-bin python3
          sudo fc-cache -fv > /dev/null

      - name: Verify CJK font + xeCJK + lmodern presence (hard assert)
        run: |
          pandoc --version | head -2
          xelatex --version | head -1
          fc-list :lang=zh-tw | grep -qi noto || { echo "FATAL: no Noto CJK zh-tw" >&2; exit 1; }
          kpsewhich xeCJK.sty > /dev/null || { echo "FATAL: xeCJK.sty missing" >&2; exit 1; }
          kpsewhich lmodern.sty > /dev/null || { echo "FATAL: lmodern.sty missing" >&2; exit 1; }
          echo "Prerequisites OK."

      - name: Concatenate chapters
        run: |
          chmod +x assets/pdf/concat.sh
          bash assets/pdf/concat.sh ${{ matrix.lang }} > whitepaper-${{ matrix.lang }}.md
          wc -l whitepaper-${{ matrix.lang }}.md

      - name: Preprocess for XeLaTeX compatibility
        # Mermaid blocks → placeholder text (diagrams stay rendered on GitHub web).
        # Emoji stripped (CJK fonts don't cover them; decorative only).
        # Variation selectors and ZWJ removed (confuse fontspec).
        run: |
          python3 <<PY
          import re
          lang = "${{ matrix.lang }}"
          p = f"whitepaper-{lang}.md"
          text = open(p, 'r', encoding='utf-8').read()

          text = re.sub(
            r'\`\`\`mermaid\s*\n.*?\n\`\`\`',
            '*[Mermaid diagram — see web version on GitHub]*',
            text, flags=re.DOTALL,
          )

          emoji_ranges = (
            (0x1F300, 0x1F64F), (0x1F680, 0x1F6FF), (0x1F700, 0x1F77F),
            (0x1F780, 0x1F7FF), (0x1F800, 0x1F8FF), (0x1F900, 0x1F9FF),
            (0x1FA00, 0x1FA6F), (0x1FA70, 0x1FAFF), (0x2600, 0x26FF),
            (0x2700, 0x27BF), (0x1F1E6, 0x1F1FF),
          )
          def is_emoji(cp):
              return any(lo <= cp <= hi for lo, hi in emoji_ranges)
          text = ''.join('' if is_emoji(ord(c)) else c for c in text)
          text = text.replace('\uFE0F', '').replace('\uFE0E', '').replace('\u200D', '')
          # Body font (lmroman10) lacks these glyphs — substitute ASCII fallbacks for PDF
          text = text.replace('\u2194', ' <-> ').replace('\u2260', ' != ')

          open(p, 'w', encoding='utf-8').write(text)
          print(f'[preprocess] {len(text)} chars after cleanup')
          PY

      - name: Build PDF via Pandoc + XeLaTeX (zh-TW)
        if: matrix.lang == 'zh-TW'
        run: |
          set -eo pipefail
          pandoc whitepaper-zh-TW.md \
            --pdf-engine=xelatex \
            --verbose \
            --metadata-file=assets/pdf/metadata-zh-TW.yaml \
            --toc --toc-depth=3 \
            --highlight-style=tango \
            -V documentclass=report \
            -V CJKmainfont="Noto Serif CJK TC" \
            -V CJKsansfont="Noto Sans CJK TC" \
            -V CJKmonofont="Noto Sans CJK TC" \
            -V geometry:a4paper \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            -V linkcolor=teal \
            -V urlcolor=blue \
            -V toccolor=black \
            -V lang=zh-Hant-TW \
            -o whitepaper-zh-TW.pdf 2>&1 | tee build.log
          ls -la whitepaper-zh-TW.pdf

      - name: Build PDF via Pandoc + XeLaTeX (en)
        if: matrix.lang == 'en'
        run: |
          set -eo pipefail
          pandoc whitepaper-en.md \
            --pdf-engine=xelatex \
            --verbose \
            --metadata-file=assets/pdf/metadata-en.yaml \
            --toc --toc-depth=3 \
            --highlight-style=tango \
            -V documentclass=report \
            -V CJKmainfont="Noto Serif CJK TC" \
            -V CJKsansfont="Noto Sans CJK TC" \
            -V CJKmonofont="Noto Sans CJK TC" \
            -V geometry:a4paper \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            -V linkcolor=teal \
            -V urlcolor=blue \
            -V toccolor=black \
            -V lang=en \
            -o whitepaper-en.pdf 2>&1 | tee build.log
          ls -la whitepaper-en.pdf

      - name: Surface pandoc error as annotation + step summary (always)
        if: always()
        run: |
          if [ -f build.log ]; then
            err=$(grep -m1 -E '^! |Error:' build.log || true)
            if [ -n "$err" ]; then
              echo "::error title=PDF build (${{ matrix.lang }}) failed::$err"
            fi
            echo "### Pandoc log (${{ matrix.lang }})" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -c 20000 build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: whitepaper-${{ matrix.lang }}
          path: |
            whitepaper-${{ matrix.lang }}.pdf
            whitepaper-${{ matrix.lang }}.md
            build.log
          if-no-files-found: warn
          retention-days: 90

      - name: Attach PDF to v0.1-draft release
        if: (github.event_name == 'release' || github.ref == 'refs/heads/master') && success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v0.1-draft
          files: whitepaper-${{ matrix.lang }}.pdf
          fail_on_unmatched_files: true
