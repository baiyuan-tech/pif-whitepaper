# Abstract
abstract: |
  本文件為 PIF AI 多租戶 AI 輔助化粧品 PIF 建檔平台的技術白皮書。涵蓋台灣
  《化粧品衛生安全管理法》法規背景、系統架構、AI 引擎（以 Anthropic Claude
  與 Claude Code 開發）、毒理資料 Pipeline、中心 RAG 整合（方案 C+ 隔離模型
  採 L1 LLM Wiki + L2 向量 RAG 雙層檢索）、安全模型、SA 審閱工作流程，以及
  開源與部署策略。全文約 80,000 繁體中文字 + 15 張 Mermaid 圖表。

